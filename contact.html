    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-glow top-left"></div>
    <div class="bg-glow bottom-right"></div>

    <!-- Navigation -->
    <header id="header">
        <nav class="container">
            <a href="#" class="logo">Abhishek<span>.Dev</span></a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="index.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>

                <li><a href="education.html">Education</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main style="padding-top: var(--nav-height); min-height: calc(100vh - 200px); display: flex; align-items: center;">
        <section id="contact" class="section" style="width: 100%;">
            <div class="container">
                <h2 class="section-title">Get In <span>Touch</span></h2>
                <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 3rem;">
                    <form>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Name</label>
                            <input type="text" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; outline: none;" placeholder="Your Name">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
                            <input type="email" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; outline: none;" placeholder="Your Email">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Message</label>
                            <textarea rows="5" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; outline: none;" placeholder="Your Message"></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="alert('Form submission functionality will need a backend to work actively, but the frontend layout is ready!')">
                            <i class="fas fa-paper-plane"></i> Send Message
                        </button>
                    </form>
                    <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 1.5rem;">
                        <a href="mailto:abhishekmp019@gmail.com" style="color: var(--accent-secondary); font-size: 1.5rem;"><i class="fas fa-envelope"></i></a>
                        <a href="https://linkedin.com/in/ak019" target="_blank" style="color: var(--accent-secondary); font-size: 1.5rem;"><i class="fab fa-linkedin"></i></a>
                        <a href="https://github.com/Abhishekpa21" target="_blank" style="color: var(--accent-secondary); font-size: 1.5rem;"><i class="fab fa-github"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <h2>Abhishek Patel</h2>
                <p>Building scalable software & impactful Android applications.</p>
            </div>
            <div class="footer-contact">
                <p><i class="fas fa-envelope"></i> abhishekmp019@gmail.com</p>
                <p><i class="fas fa-phone-alt"></i> +91-8618135893</p>
            </div>
            <div class="footer-social">
                <a href="https://linkedin.com/in/ak019" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/Abhishekpa21" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Abhishek Patel. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
